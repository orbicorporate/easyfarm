function construirFases(cultura){return[{nome:'Planejamento',icon:'📋',cor:'#3B82F6',etapas:[{icon:'📐',titulo:'Definir área e cultivar',desc:'Decida a área e o cultivar adequado ao seu clima e mercado.',dicas:['Compare cultivares','Comece pequeno','Use a calculadora']},{icon:'💰',titulo:'Levantar capital',desc:`Custo estimado: ${fmt(cultura.custImpl)}/ha.`,dicas:['PRONAF: juros 3–6% a.a.','Reserve 20% de contingência','Planeje fluxo de caixa']}]},{nome:'Preparo do Solo',icon:'🌍',cor:'#F97316',etapas:[{icon:'🧪',titulo:'Análise e correção',desc:'pH ideal varia. Aplique calcário 30–60 dias antes de plantar.',dicas:['Análise: R$ 30–50','Corrija boro e zinco','pH define produtividade']},{icon:'🚜',titulo:'Preparo mecânico',desc:'Aração profunda, subsolagem e gradagem.',dicas:['Subsolagem rompe compactação','Drene áreas úmidas','Prepare com 60 dias']}]},{nome:'Plantio',icon:'🌱',cor:'#22C55E',etapas:[{icon:'🌿',titulo:'Mudas certificadas',desc:'Use material certificado pelo MAPA.',dicas:['Nunca sem certificação','Compre 10% a mais','Armazene adequadamente']},{icon:'🌾',titulo:`Plantio de ${cultura.nome}`,desc:'Siga espaçamento e época ideal.',dicas:['Irrigue imediatamente','Replante falhas em 7 dias','Registre a data']}]},{nome:'Crescimento',icon:'🌿',cor:'#65A30D',etapas:[{icon:'🧬',titulo:'Adubação',desc:'Aplique NPK conforme análise foliar.',dicas:['Análise foliar a cada 45 dias','Fertirrigação é eficiente','Sem exagero em nitrogênio']},{icon:'🔬',titulo:'Controle de pragas',desc:'Monitore semanalmente. Fungicidas a cada 7–10 dias.',dicas:['MIP reduz custos 50%','Alterne princípios ativos','Remova material doente']}]},{nome:'Colheita',icon:cultura.emoji,cor:'#E84855',etapas:[{icon:cultura.emoji,titulo:`Colheita de ${cultura.nome}`,desc:'Colha no ponto ideal, pela manhã.',dicas:['Calibre correto','Manhã é melhor','Caixas limpas']},{icon:'💰',titulo:'Comercialização',desc:'Venda direta paga 2–3× mais.',dicas:['WhatsApp gratuito','Embale com identidade','Fidelize clientes']}]}];}

function CalendarioScreen({userId,todasCulturas,onAbrirPlano,onIrPlanos}){const[itens,setItens]=useState([]);const[loading,setLoading]=useState(true);useEffect(()=>{if(!userId){setLoading(false);return;}async function carregar(){const{data:inicios}=await sb.from('planos_inicio').select('cultura_nome,data_inicio').eq('usuario_id',userId);const{data:progresso}=await sb.from('plano_progresso').select('cultura_nome,etapa_id,feito').eq('usuario_id',userId);const feitosSet=new Set((progresso||[]).filter(p=>p.feito).map(p=>`${p.cultura_nome}::${p.etapa_id}`));const lista=[];(inicios||[]).forEach(ini=>{const found=todasCulturas.find(x=>x.c.nome===ini.cultura_nome);if(!found)return;const etapas=calcularEtapasComData(found.c,ini.data_inicio);etapas.forEach(e=>{if(feitosSet.has(`${ini.cultura_nome}::${e.id}`))return;lista.push({...e,cultura:found.c,regiao:found.rg});});});lista.sort((a,b)=>a.dataISO.localeCompare(b.dataISO));setItens(lista);setLoading(false);}carregar();},[userId]);if(loading)return(<div style={{display:'flex',justifyContent:'center',padding:60}}><div style={{width:36,height:36,border:'3px solid #E8ECE6',borderTopColor:'#1B4332',borderRadius:'50%',animation:'spin 1s linear infinite'}} /></div>);const hojeISO=new Date().toISOString().slice(0,10);const em7ISO=(()=>{const d=new Date();d.setDate(d.getDate()+7);return d.toISOString().slice(0,10);})();const atrasados=itens.filter(i=>i.dataISO<hojeISO);const hoje=itens.filter(i=>i.dataISO===hojeISO);const proximos=itens.filter(i=>i.dataISO>hojeISO&&i.dataISO<=em7ISO);const maisTarde=itens.filter(i=>i.dataISO>em7ISO);const Grupo=({titulo,cor,lista,icone})=>lista.length>0&&(<div style={{marginBottom:20}}><div style={{fontSize:12,fontWeight:800,color:cor,textTransform:'uppercase',marginBottom:10,display:'flex',alignItems:'center',gap:6}}>{icone} {titulo} · {lista.length}</div><div style={{display:'flex',flexDirection:'column',gap:8}}>{lista.map((it,i)=>(<div key={i} onClick={()=>onAbrirPlano(it.regiao,it.cultura)} style={{background:'#fff',borderRadius:14,padding:'12px 14px',display:'flex',alignItems:'center',gap:11,boxShadow:'0 2px 8px rgba(0,0,0,.04)',cursor:'pointer',borderLeft:`4px solid ${cor}`}}><span style={{fontSize:20}}>{it.icon}</span><div style={{flex:1,minWidth:0}}><div style={{fontSize:12.5,fontWeight:700,color:'#1B4332'}}>{it.titulo}</div><div style={{fontSize:10.5,color:'#8A9584',marginTop:1}}>{it.cultura.emoji} {it.cultura.nome} · {it.data.toLocaleDateString('pt-BR')}</div></div><span style={{fontSize:13,color:'#C0C9BC'}}>→</span></div>))}</div></div>);return(<div style={{paddingBottom:60,background:'#F4F6F3',minHeight:'100vh'}}><div style={{padding:'20px 22px 16px'}}><div style={{fontSize:11,fontWeight:700,color:'#A3AD9D',textTransform:'uppercase'}}>Avisos e tarefas</div><div className='serif' style={{fontSize:22,fontWeight:800,color:'#1B4332',marginTop:2}}>Calendário</div>{itens.length>0&&<div style={{fontSize:12,color:'#8A9584',marginTop:6}}>Calculado a partir da data de início de cada plano</div>}</div><div style={{padding:'0 22px'}}>{itens.length===0&&(<div style={{background:'#fff',borderRadius:18,padding:'36px 20px',textAlign:'center',boxShadow:'0 2px 8px rgba(0,0,0,.04)'}}><div style={{fontSize:38,marginBottom:12}}>📅</div><div style={{fontSize:15,fontWeight:800,color:'#1B4332',marginBottom:4}}>Nenhum aviso por aqui</div><div style={{fontSize:12,color:'#A3AD9D',marginBottom:18}}>Abra um plano e defina a data de início para ver os avisos aqui</div><button onClick={onIrPlanos} style={{background:'#1B4332',color:'#fff',border:'none',borderRadius:12,padding:'11px 20px',fontSize:12.5,fontWeight:800}}>Ver Planos Ativos →</button></div>)}<Grupo titulo='Atrasado' cor='#E84855' icone='⚠️' lista={atrasados} /><Grupo titulo='Hoje' cor='#F97316' icone='🔔' lista={hoje} /><Grupo titulo='Próximos 7 dias' cor='#3B82F6' icone='📆' lista={proximos} /><Grupo titulo='Mais tarde' cor='#8A9584' icone='🕒' lista={maisTarde} /></div></div>);}
function NavIcon({tipo,ativo}){const cor=ativo?'#1B4332':'#B8C0B2';const sw=1.8;const s=22;const props={width:s,height:s,viewBox:'0 0 24 24',fill:'none',stroke:cor,strokeWidth:sw,strokeLinecap:'round',strokeLinejoin:'round'};if(tipo==='calc')return(<svg {...props}><rect x='4' y='2' width='16' height='20' rx='2'/><line x1='8' y1='6' x2='16' y2='6'/><line x1='8' y1='10' x2='8' y2='10.01'/><line x1='12' y1='10' x2='12' y2='10.01'/><line x1='16' y1='10' x2='16' y2='10.01'/><line x1='8' y1='14' x2='8' y2='14.01'/><line x1='12' y1='14' x2='12' y2='14.01'/><line x1='16' y1='14' x2='16' y2='14.01'/><line x1='8' y1='18' x2='8' y2='18.01'/><line x1='12' y1='18' x2='12' y2='18.01'/></svg>);if(tipo==='guia')return(<svg {...props}><path d='M4 19.5A2.5 2.5 0 0 1 6.5 17H20'/><path d='M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z'/></svg>);if(tipo==='plano')return(<svg {...props}><path d='M9 11l3 3L22 4'/><path d='M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11'/></svg>);return(<svg {...props}><path d='M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2'/><circle cx='12' cy='7' r='4'/></svg>);}
function App(){const[session,setSession]=useState(undefined);const[sel,setSel]=useState(null);const[screen,setScreen]=useState(0);const[planos,setPlanos]=useState([]);const[historico,setHistorico]=useState([]);const[precarregar,setPrecarregar]=useState(null);const[notaSel,setNotaSel]=useState(null);const[cidadeSalva,setCidadeSalva]=useState(null);const[cidadeHome,setCidadeHome]=useState(undefined);const uid=session?.user?.id;const TODAS_CULTURAS=[...REGIOES.flatMap(rg=>rg.culturas.map(c=>({c,rg}))),...VERDURAS.culturas.map(c=>({c,rg:{id:'geral',label:'Verduras',emoji:VERDURAS.emoji}})),...TEMPEROS.culturas.map(c=>({c,rg:{id:'geral',label:'Temperos',emoji:TEMPEROS.emoji}}))];function carregarResumo(id){if(!id)return;sb.from('plano_progresso').select('cultura_nome,feito').eq('usuario_id',id).then(({data})=>{const pc={};(data||[]).forEach(r=>{if(!pc[r.cultura_nome])pc[r.cultura_nome]={feitos:0};if(r.feito)pc[r.cultura_nome].feitos++;});const lista=[];Object.keys(pc).forEach(n=>{if(pc[n].feitos>0){const found=TODAS_CULTURAS.find(x=>x.c.nome===n);if(found)lista.push({cultura:found.c,regiao:found.rg,pct:Math.round(pc[n].feitos/10*100)});}});setPlanos(lista);});sb.from('simulacoes').select('id').eq('usuario_id',id).then(({data})=>setHistorico(data||[]));}
function abrirSimulacao(s){const found=TODAS_CULTURAS.find(x=>x.c.nome===s.cultura_nome);if(!found)return;setPrecarregar(s);setSel({r:found.rg,c:found.c});setScreen(0);}
function abrirPlano(p){setPrecarregar(null);setSel({r:p.regiao,c:p.cultura});setScreen(2);}
function carregarCidade(id){sb.from('usuarios').select('cidade_nome,cidade_lat,cidade_lon,cidade_regiao_id,home_cidade_nome,home_cidade_lat,home_cidade_lon').eq('id',id).single().then(({data})=>{if(data&&data.cidade_lat!=null){setCidadeSalva({regiaoId:data.cidade_regiao_id,nome:data.cidade_nome,lat:data.cidade_lat,lon:data.cidade_lon,generica:false});}if(data&&data.home_cidade_lat!=null){setCidadeHome({nome:data.home_cidade_nome,lat:data.home_cidade_lat,lon:data.home_cidade_lon});}else{setCidadeHome(null);}}).catch(()=>setCidadeHome(null));}useEffect(()=>{sb.auth.getSession().then(({data:{session}})=>{setSession(session);if(session?.user?.id){carregarResumo(session.user.id);carregarCidade(session.user.id);}});const{data:{subscription}}=sb.auth.onAuthStateChange((_,s)=>{setSession(s);if(s?.user?.id){carregarResumo(s.user.id);carregarCidade(s.user.id);}});return()=>subscription.unsubscribe();},[]);if(session===undefined)return<SplashScreen/>;if(!session)return<AuthScreen/>;const u=session.user;if(notaSel)return(<div style={{minHeight:'100vh',background:'#F4F6F3',maxWidth:430,margin:'0 auto'}}><NotaEditorScreen cultura={notaSel} userId={uid} onBack={()=>setNotaSel(null)}/></div>);if(!sel){if(screen===3)return(<div style={{minHeight:'100vh',background:'#F4F6F3',maxWidth:430,margin:'0 auto'}}><div style={{padding:'44px 22px 0'}}><button onClick={()=>setScreen(0)} style={{background:'#fff',border:'1px solid #E8ECE6',borderRadius:11,padding:'9px 14px',fontSize:12,fontWeight:700,color:'#5A6857'}}>← Página inicial</button></div><HistoricoScreen userId={uid} onAbrir={abrirSimulacao}/></div>);if(screen===4)return(<div style={{minHeight:'100vh',background:'#F4F6F3',maxWidth:430,margin:'0 auto'}}><div style={{padding:'44px 22px 0'}}><button onClick={()=>setScreen(0)} style={{background:'#fff',border:'1px solid #E8ECE6',borderRadius:11,padding:'9px 14px',fontSize:12,fontWeight:700,color:'#5A6857'}}>← Página inicial</button></div><PlanosScreen planos={planos} onAbrir={abrirPlano}/></div>);if(screen===5)return(<div style={{minHeight:'100vh',background:'#F4F6F3',maxWidth:430,margin:'0 auto'}}><ChatScreen cultura={null} regiao={null} session={session} onBack={()=>setScreen(0)}/></div>);if(screen===6)return(<div style={{minHeight:'100vh',background:'#F4F6F3',maxWidth:430,margin:'0 auto'}}><div style={{padding:'44px 22px 0'}}><button onClick={()=>setScreen(0)} style={{background:'#fff',border:'1px solid #E8ECE6',borderRadius:11,padding:'9px 14px',fontSize:12,fontWeight:700,color:'#5A6857'}}>← Página inicial</button></div><NotasListScreen userId={uid} todasCulturas={TODAS_CULTURAS} onAbrir={(cult)=>setNotaSel(cult)}/></div>);if(screen===7)return(<div style={{minHeight:'100vh',background:'#F4F6F3',maxWidth:430,margin:'0 auto'}}><div style={{padding:'44px 22px 0'}}><button onClick={()=>setScreen(0)} style={{background:'#fff',border:'1px solid #E8ECE6',borderRadius:11,padding:'9px 14px',fontSize:12,fontWeight:700,color:'#5A6857'}}>← Página inicial</button></div><MinhaFazendaScreen userId={uid} onAbrir={abrirSimulacao}/></div>);if(screen===8)return(<div style={{minHeight:'100vh',background:'#F4F6F3',maxWidth:430,margin:'0 auto'}}><div style={{padding:'44px 22px 0'}}><button onClick={()=>setScreen(0)} style={{background:'#fff',border:'1px solid #E8ECE6',borderRadius:11,padding:'9px 14px',fontSize:12,fontWeight:700,color:'#5A6857'}}>← Página inicial</button></div><CalendarioScreen userId={uid} todasCulturas={TODAS_CULTURAS} onAbrirPlano={(rg,c)=>{setPrecarregar(null);setSel({r:rg,c});setScreen(2);}} onIrPlanos={()=>setScreen(4)}/></div>);return(<HomeScreen usuario={u} planos={planos} historico={historico} irHistorico={()=>setScreen(3)} irPlanos={()=>setScreen(4)} irNotas={()=>setScreen(6)} irChat={()=>setScreen(5)} irFazenda={()=>setScreen(7)} irCalendario={()=>setScreen(8)} userId={uid} cidadeSalva={cidadeSalva} onCidadeSalva={setCidadeSalva} cidadeHome={cidadeHome} onCidadeHome={setCidadeHome} onSelect={(r,c,tela)=>{setPrecarregar(null);setSel({r,c});setScreen(tela!=null?tela:0);}} onLogout={()=>sb.auth.signOut()} />);}const{r,c}=sel;return(<div style={{minHeight:'100vh',background:'#F4F6F3',maxWidth:430,margin:'0 auto'}}><CultureBadge cultura={c} regiao={r} onClear={()=>{setSel(null);setPrecarregar(null);setScreen(0);carregarResumo(uid);}} />{screen===0&&<CalcScreen key={c.nome+(precarregar?precarregar.id:'')} cultura={c} regiao={r} userId={uid} precarregar={precarregar}/>}{screen===1&&<GuiaScreen key={c.nome} cultura={c} regiao={r}/>}{screen===2&&<PlanoScreen key={c.nome} cultura={c} regiao={r} userId={uid} onProgresso={()=>carregarResumo(uid)} onAbrirNotas={()=>setNotaSel(c)}/>}{screen===3&&<HistoricoScreen userId={uid} onAbrir={abrirSimulacao}/>}{screen===4&&<PlanosScreen planos={planos} onAbrir={abrirPlano}/>}{screen===5&&<ChatScreen key={c.nome} cultura={c} regiao={r} session={session} onBack={()=>setScreen(0)}/>}{screen!==5&&<ChatBubble onClick={()=>setScreen(5)} bottom={110} />}<div style={{display:screen===5?'none':'flex',position:'fixed',bottom:0,left:'50%',transform:'translateX(-50%)',width:'100%',maxWidth:430,background:'rgba(255,255,255,.97)',backdropFilter:'blur(24px)',borderTop:'1px solid #E8ECE6',padding:'12px 0 22px',justifyContent:'space-around',zIndex:200}}>{[{t:'calc',l:'Calculadora'},{t:'guia',l:'Guia'},{t:'plano',l:'Plano'},{t:'hist',l:'Histórico'}].map((n,i)=>{const a=screen===i;return(<button key={i} onClick={()=>{setScreen(i);if(i!==0)setPrecarregar(null);}} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:5,background:'transparent',border:'none',padding:'0 10px'}}><NavIcon tipo={n.t} ativo={a} /><span style={{fontSize:9,fontWeight:a?700:500,color:a?'#1B4332':'#B8C0B2'}}>{n.l}</span></button>);})}</div></div>);}
const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>

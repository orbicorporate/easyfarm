function AuthScreen(){const[modo,setModo]=useState('login');const[email,setEmail]=useState('');const[senha,setSenha]=useState('');const[nome,setNome]=useState('');const[erro,setErro]=useState('');const[loading,setLoading]=useState(false);const[msg,setMsg]=useState('');async function submit(){setErro('');setMsg('');setLoading(true);try{if(modo==='cadastro'){const{error}=await sb.auth.signUp({email,password:senha,options:{data:{nome}}});if(error)throw error;setMsg('✅ Conta criada! Verifique seu e-mail.');}else if(modo==='recuperar'){const{error}=await sb.auth.resetPasswordForEmail(email);if(error)throw error;setMsg('✅ E-mail enviado!');}else{const{error}=await sb.auth.signInWithPassword({email,password:senha});if(error)throw error;}}catch(e){const m={'Invalid login credentials':'E-mail ou senha incorretos.','User already registered':'E-mail já cadastrado.','Password should be at least 6 characters':'Senha deve ter 6+ caracteres.'};setErro(m[e.message]||e.message);}setLoading(false);}return(<div style={{minHeight:'100vh',background:'linear-gradient(160deg,#0F2D1A 0%,#1B4332 55%,#14532D 100%)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'24px'}}><div style={{marginBottom:30,textAlign:'center'}}><img src={ICON} style={{width:76,height:76,borderRadius:18,marginBottom:14}} onError={e=>e.target.style.display='none'} /><div className='serif' style={{fontSize:28,fontWeight:800,color:'#fff'}}>Easyfarm</div><div style={{fontSize:13,color:'rgba(255,255,255,.5)',marginTop:6}}>Planejamento agrícola inteligente</div></div><div style={{width:'100%',maxWidth:360,background:'rgba(255,255,255,.06)',borderRadius:26,padding:'28px 24px',border:'1px solid rgba(255,255,255,.1)'}}><div style={{fontSize:18,fontWeight:800,color:'#fff',marginBottom:20}}>{modo==='login'?'Entrar':modo==='cadastro'?'Criar conta':'Recuperar senha'}</div>{modo==='cadastro'&&<div style={{marginBottom:12}}><div style={{fontSize:11,fontWeight:700,color:'rgba(255,255,255,.5)',marginBottom:6,textTransform:'uppercase'}}>Seu nome</div><input value={nome} onChange={e=>setNome(e.target.value)} placeholder='João Silva' style={{width:'100%',background:'rgba(255,255,255,.08)',border:'1.5px solid rgba(255,255,255,.12)',borderRadius:12,padding:'12px 14px',color:'#fff',fontSize:14,outline:'none'}} /></div>}<div style={{marginBottom:12}}><div style={{fontSize:11,fontWeight:700,color:'rgba(255,255,255,.5)',marginBottom:6,textTransform:'uppercase'}}>E-mail</div><input type='email' value={email} onChange={e=>setEmail(e.target.value)} placeholder='seuemail@gmail.com' style={{width:'100%',background:'rgba(255,255,255,.08)',border:'1.5px solid rgba(255,255,255,.12)',borderRadius:12,padding:'12px 14px',color:'#fff',fontSize:14,outline:'none'}} /></div>{modo!=='recuperar'&&<div style={{marginBottom:20}}><div style={{fontSize:11,fontWeight:700,color:'rgba(255,255,255,.5)',marginBottom:6,textTransform:'uppercase'}}>Senha</div><input type='password' value={senha} onChange={e=>setSenha(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()} placeholder='Mínimo 6 caracteres' style={{width:'100%',background:'rgba(255,255,255,.08)',border:'1.5px solid rgba(255,255,255,.12)',borderRadius:12,padding:'12px 14px',color:'#fff',fontSize:14,outline:'none'}} /></div>}{erro&&<div style={{background:'rgba(239,68,68,.15)',border:'1px solid rgba(239,68,68,.3)',borderRadius:10,padding:'10px 12px',fontSize:12,color:'#FCA5A5',marginBottom:14}}>{erro}</div>}{msg&&<div style={{background:'rgba(74,222,128,.15)',border:'1px solid rgba(74,222,128,.3)',borderRadius:10,padding:'10px 12px',fontSize:12,color:'#86EFAC',marginBottom:14}}>{msg}</div>}<button onClick={submit} disabled={loading} style={{width:'100%',padding:'15px',background:loading?'rgba(255,255,255,.1)':'linear-gradient(135deg,#22C55E,#16A34A)',color:'#fff',border:'none',borderRadius:14,fontSize:15,fontWeight:800,cursor:loading?'not-allowed':'pointer',boxShadow:'0 6px 20px rgba(34,197,94,.4)'}}>{loading?'⏳ Aguarde...':modo==='login'?'Entrar':modo==='cadastro'?'Criar conta':'Recuperar senha'}</button><div style={{marginTop:20,display:'flex',flexDirection:'column',gap:10,alignItems:'center'}}>{modo==='login'&&<><button onClick={()=>{setModo('cadastro');setErro('');setMsg('');}} style={{background:'none',border:'none',color:'rgba(255,255,255,.55)',fontSize:13,cursor:'pointer'}}>Não tem conta? <span style={{color:'#4ADE80',fontWeight:700}}>Criar conta grátis</span></button><button onClick={()=>{setModo('recuperar');setErro('');setMsg('');}} style={{background:'none',border:'none',color:'rgba(255,255,255,.35)',fontSize:12,cursor:'pointer'}}>Esqueci minha senha</button></>}{modo!=='login'&&<button onClick={()=>{setModo('login');setErro('');setMsg('');}} style={{background:'none',border:'none',color:'rgba(255,255,255,.55)',fontSize:13,cursor:'pointer'}}>← Voltar</button>}</div></div></div>);}

function PlanoScreen({cultura,regiao,userId,onProgresso}){const fases=[{nome:'Planejamento',icon:'📋',cor:'#3B82F6',etapas:[{icon:'📐',titulo:'Definir área e cultivar',desc:'Decida a área e o cultivar adequado ao seu clima e mercado.',dicas:['Compare cultivares','Comece pequeno','Use a calculadora']},{icon:'💰',titulo:'Levantar capital',desc:`Custo estimado: ${fmt(cultura.custImpl)}/ha.`,dicas:['PRONAF: juros 3–6% a.a.','Reserve 20% de contingência','Planeje fluxo de caixa']}]},{nome:'Preparo do Solo',icon:'🌍',cor:'#F97316',etapas:[{icon:'🧪',titulo:'Análise e correção',desc:'pH ideal varia. Aplique calcário 30–60 dias antes de plantar.',dicas:['Análise: R$ 30–50','Corrija boro e zinco','pH define produtividade']},{icon:'🚜',titulo:'Preparo mecânico',desc:'Aração profunda, subsolagem e gradagem.',dicas:['Subsolagem rompe compactação','Drene áreas úmidas','Prepare com 60 dias']}]},{nome:'Plantio',icon:'🌱',cor:'#22C55E',etapas:[{icon:'🌿',titulo:'Mudas certificadas',desc:'Use material certificado pelo MAPA.',dicas:['Nunca sem certificação','Compre 10% a mais','Armazene adequadamente']},{icon:'🌾',titulo:`Plantio de ${cultura.nome}`,desc:'Siga espaçamento e época ideal.',dicas:['Irrigue imediatamente','Replante falhas em 7 dias','Registre a data']}]},{nome:'Crescimento',icon:'🌿',cor:'#65A30D',etapas:[{icon:'🧬',titulo:'Adubação',desc:'Aplique NPK conforme análise foliar.',dicas:['Análise foliar a cada 45 dias','Fertirrigação é eficiente','Sem exagero em nitrogênio']},{icon:'🔬',titulo:'Controle de pragas',desc:'Monitore semanalmente. Fungicidas a cada 7–10 dias.',dicas:['MIP reduz custos 50%','Alterne princípios ativos','Remova material doente']}]},{nome:'Colheita',icon:cultura.emoji,cor:'#E84855',etapas:[{icon:cultura.emoji,titulo:`Colheita de ${cultura.nome}`,desc:'Colha no ponto ideal, pela manhã.',dicas:['Calibre correto','Manhã é melhor','Caixas limpas']},{icon:'💰',titulo:'Comercialização',desc:'Venda direta paga 2–3× mais.',dicas:['WhatsApp gratuito','Embale com identidade','Fidelize clientes']}]}];const[progresso,setProgresso]=useState({});const[carregando,setCarregando]=useState(true);useEffect(()=>{if(!userId){setCarregando(false);return;}sb.from('plano_progresso').select('etapa_id,feito,feito_em').eq('usuario_id',userId).eq('cultura_nome',cultura.nome).then(({data})=>{const m={};(data||[]).forEach(r=>{m[r.etapa_id]={feito:r.feito,feito_em:r.feito_em};});setProgresso(m);setCarregando(false);});},[userId,cultura.nome]);async function marcar(id){const nf=!(progresso[id]?.feito||false);setProgresso(prev=>({...prev,[id]:{feito:nf,feito_em:nf?new Date().toISOString():null}}));if(onProgresso)setTimeout(onProgresso,300);if(!userId)return;await sb.from('plano_progresso').upsert({usuario_id:userId,cultura_nome:cultura.nome,etapa_id:id,feito:nf,feito_em:nf?new Date().toISOString():null},{onConflict:'usuario_id,cultura_nome,etapa_id'});}const todos=fases.flatMap(f=>f.etapas.map((_,i)=>`${f.nome}-${i}`));const feitos=todos.filter(id=>progresso[id]?.feito).length;const pct=Math.round(feitos/todos.length*100);const[exp,setExp]=useState(null);if(carregando)return(<div style={{display:'flex',justifyContent:'center',padding:60}}><div style={{width:36,height:36,border:'3px solid #E8ECE6',borderTopColor:cultura.cor,borderRadius:'50%',animation:'spin 1s linear infinite'}} /></div>);return(<div style={{paddingBottom:120,background:'#F4F6F3',minHeight:'100vh'}}><div style={{padding:'20px 22px 0'}}><div style={{fontSize:11,fontWeight:700,color:'#A3AD9D',textTransform:'uppercase'}}>Plano de Produção</div><div className='serif' style={{fontSize:22,fontWeight:800,color:'#1B4332',marginTop:2}}>{cultura.emoji} {cultura.nome}</div><div style={{marginTop:8}}><SafrasPill n={cultura.safras} /></div></div><div style={{padding:'16px 22px 0',display:'flex',flexDirection:'column',gap:12}}><div style={{background:'linear-gradient(135deg,#1B4332,#14532D)',borderRadius:18,padding:'18px',boxShadow:'0 6px 20px rgba(27,67,50,.25)'}}><div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}><div className='serif' style={{fontSize:22,fontWeight:800,color:'#fff'}}>{pct}% concluído</div><div style={{fontSize:12,color:'rgba(255,255,255,.6)'}}>{feitos}/{todos.length} etapas</div></div><div style={{height:8,borderRadius:99,background:'rgba(255,255,255,.15)',overflow:'hidden'}}><div style={{width:`${pct}%`,height:'100%',background:'#4ADE80',transition:'width .5s'}} /></div>{userId&&<div style={{fontSize:11,color:'#4ADE80',marginTop:10,fontWeight:600}}>☁️ Progresso salvo na nuvem</div>}</div>{fases.map(fase=>{const et=fase.etapas.map((_,i)=>({...fase.etapas[i],_id:`${fase.nome}-${i}`}));const dn=et.filter(e=>progresso[e._id]?.feito).length;return(<div key={fase.nome}><div style={{display:'flex',alignItems:'center',gap:9,marginBottom:8,marginTop:4}}><div style={{width:34,height:34,borderRadius:11,background:dn===et.length&&et.length>0?fase.cor:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:15,boxShadow:'0 2px 8px rgba(0,0,0,.05)'}}>{dn===et.length&&et.length>0?'✓':fase.icon}</div><div style={{flex:1}}><div style={{fontSize:14,fontWeight:800,color:'#1B4332'}}>{fase.nome}</div><div style={{fontSize:10,color:'#A3AD9D'}}>{dn}/{et.length} etapas</div></div></div>{et.map(e=>{const ok=progresso[e._id]?.feito||false;const isX=exp===e._id;const df=progresso[e._id]?.feito_em?new Date(progresso[e._id].feito_em).toLocaleDateString('pt-BR'):null;return(<div key={e._id} style={{background:'#fff',borderRadius:14,marginBottom:8,overflow:'hidden',boxShadow:'0 2px 8px rgba(0,0,0,.04)',border:ok?`1.5px solid ${fase.cor}44`:'1.5px solid transparent'}}><div onClick={()=>setExp(isX?null:e._id)} style={{padding:'13px 15px',cursor:'pointer',display:'flex',gap:11,alignItems:'center'}}><button onClick={ev=>{ev.stopPropagation();marcar(e._id);}} style={{width:26,height:26,borderRadius:8,border:`2px solid ${ok?fase.cor:'#D8DFD4'}`,background:ok?fase.cor:'#fff',display:'flex',alignItems:'center',justifyC function PlanosScreen({planos,onAbrir}){return(<div style={{paddingBottom:120,background:'#F4F6F3',minHeight:'100vh'}}><div style={{padding:'20px 22px 16px'}}><div style={{fontSize:11,fontWeight:700,color:'#A3AD9D',textTransform:'uppercase'}}>Meus planos</div><div className='serif' style={{fontSize:22,fontWeight:800,color:'#1B4332',marginTop:2}}>Planos Ativos</div>{planos.length>0&&<div style={{fontSize:12,color:'#8A9584',marginTop:6}}>Toque em um plano para continuar o checklist</div>}</div><div style={{padding:'0 22px',display:'flex',flexDirection:'column',gap:12}}>{planos.length===0&&(<div style={{background:'#fff',borderRadius:18,padding:'36px 20px',textAlign:'center',boxShadow:'0 2px 8px rgba(0,0,0,.04)'}}><div style={{fontSize:38,marginBottom:12}}>🌱</div><div style={{fontSize:15,fontWeight:800,color:'#1B4332',marginBottom:4}}>Nenhum plano iniciado</div><div style={{fontSize:12,color:'#A3AD9D'}}>Escolha uma cultura e marque a primeira etapa do plano</div></div>)}{planos.map((p,i)=>(<div key={i} onClick={()=>onAbrir(p)} style={{background:'#fff',borderRadius:18,overflow:'hidden',boxShadow:'0 2px 10px rgba(0,0,0,.05)',cursor:'pointer'}}><CardFoto nome={p.cultura.nome} cor={p.cultura.cor} emoji={p.cultura.emoji} altura={92}><div style={{position:'absolute',inset:0,background:'linear-gradient(to right,rgba(0,0,0,.68),rgba(0,0,0,.25))'}} /><div style={{position:'absolute',bottom:10,left:14,display:'flex',alignItems:'center',gap:9}}><span style={{fontSize:24}}>{p.cultura.emoji}</span><div><div style={{fontSize:16,fontWeight:800,color:'#fff'}}>{p.cultura.nome}</div><div style={{fontSize:10.5,color:'rgba(255,255,255,.82)'}}>{p.regiao.emoji} {p.regiao.label} · {p.cultura.safras} safra{p.cultura.safras>1?'s':''}/ano</div></div></div><div style={{position:'absolute',top:10,right:10,background:'rgba(255,255,255,.93)',borderRadius:9,padding:'4px 10px',fontSize:12,fontWeight:800,color:'#1B4332'}}>{p.pct}%</div></CardFoto><div style={{padding:'13px 15px'}}><div style={{height:7,borderRadius:99,background:'#EDF1EA',overflow:'hidden'}}><div style={{height:'100%',width:`${p.pct}%`,background:p.pct===100?'#22C55E':'#4ADE80',borderRadius:99,transition:'width .4s'}} /></div><div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:9}}><span style={{fontSize:11.5,color:'#8A9584',fontWeight:600}}>{p.pct===100?'🏆 Plano concluído':`${p.pct}% do checklist concluído`}</span><span style={{fontSize:11.5,fontWeight:800,color:'#22C55E'}}>Continuar →</span></div></div></div>))}</div></div>);}
function HistoricoScreen({userId,onAbrir}){const[sims,setSims]=useState([]);const[loading,setLoading]=useState(true);useEffect(()=>{if(!userId){setLoading(false);return;}sb.from('simulacoes').select('*').eq('usuario_id',userId).order('criado_em',{ascending:false}).limit(20).then(({data})=>{setSims(data||[]);setLoading(false);});},[userId]);async function del(id){await sb.from('simulacoes').delete().eq('id',id);setSims(p=>p.filter(s=>s.id!==id));}if(loading)return(<div style={{display:'flex',justifyContent:'center',padding:60}}><div style={{width:36,height:36,border:'3px solid #E8ECE6',borderTopColor:'#1B4332',borderRadius:'50%',animation:'spin 1s linear infinite'}} /></div>);return(<div style={{paddingBottom:120,background:'#F4F6F3',minHeight:'100vh'}}><div style={{padding:'20px 22px 16px'}}><div style={{fontSize:11,fontWeight:700,color:'#A3AD9D',textTransform:'uppercase'}}>Histórico</div><div className='serif' style={{fontSize:22,fontWeight:800,color:'#1B4332',marginTop:2}}>Simulações Salvas</div>{sims.length>0&&<div style={{fontSize:12,color:'#8A9584',marginTop:6}}>Toque em uma simulação para reabrir na calculadora</div>}</div><div style={{padding:'0 22px',display:'flex',flexDirection:'column',gap:12}}>{sims.length===0&&(<div style={{background:'#fff',borderRadius:18,padding:'36px 20px',textAlign:'center',boxShadow:'0 2px 8px rgba(0,0,0,.04)'}}><div style={{fontSize:38,marginBottom:12}}>📊</div><div style={{fontSize:15,fontWeight:800,color:'#1B4332',marginBottom:4}}>Nenhuma simulação ainda</div><div style={{fontSize:12,color:'#A3AD9D'}}>Calcule o lucro e clique em Salvar</div></div>)}{sims.map(s=>(<div key={s.id} onClick={()=>onAbrir&&onAbrir(s)} style={{background:'#fff',borderRadius:18,overflow:'hidden',boxShadow:'0 2px 10px rgba(0,0,0,.05)',cursor:'pointer'}}><CardFoto nome={s.cultura_nome} cor={'#1B4332'} emoji={s.cultura_emoji} altura={80}><div style={{position:'absolute',inset:0,background:'linear-gradient(to right,rgba(0,0,0,.65),rgba(0,0,0,.25))'}} /><div s function NavIcon({tipo,ativo}){const cor=ativo?'#1B4332':'#B8C0B2';const sw=1.8;const s=22;const props={width:s,height:s,viewBox:'0 0 24 24',fill:'none',stroke:cor,strokeWidth:sw,strokeLinecap:'round',strokeLinejoin:'round'};if(tipo==='calc')return(<svg {...props}><rect x='4' y='2' width='16' height='20' rx='2'/><line x1='8' y1='6' x2='16' y2='6'/><line x1='8' y1='10' x2='8' y2='10.01'/><line x1='12' y1='10' x2='12' y2='10.01'/><line x1='16' y1='10' x2='16' y2='10.01'/><line x1='8' y1='14' x2='8' y2='14.01'/><line x1='12' y1='14' x2='12' y2='14.01'/><line x1='16' y1='14' x2='16' y2='14.01'/><line x1='8' y1='18' x2='8' y2='18.01'/><line x1='12' y1='18' x2='12' y2='18.01'/></svg>);if(tipo==='guia')return(<svg {...props}><path d='M4 19.5A2.5 2.5 0 0 1 6.5 17H20'/><path d='M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z'/></svg>);if(tipo==='plano')return(<svg {...props}><path d='M9 11l3 3L22 4'/><path d='M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11'/></svg>);return(<svg {...props}><path d='M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2'/><circle cx='12' cy='7' r='4'/></svg>);}
function App(){const[session,setSession]=useState(undefined);const[sel,setSel]=useState(null);const[screen,setScreen]=useState(0);const[planos,setPlanos]=useState([]);const[historico,setHistorico]=useState([]);const[precarregar,setPrecarregar]=useState(null);const uid=session?.user?.id;const TODAS_CULTURAS=[...REGIOES.flatMap(rg=>rg.culturas.map(c=>({c,rg}))),...VERDURAS.culturas.map(c=>({c,rg:{id:'geral',label:'Verduras',emoji:VERDURAS.emoji}})),...TEMPEROS.culturas.map(c=>({c,rg:{id:'geral',label:'Temperos',emoji:TEMPEROS.emoji}}))];function carregarResumo(id){if(!id)return;sb.from('plano_progresso').select('cultura_nome,feito').eq('usuario_id',id).then(({data})=>{const pc={};(data||[]).forEach(r=>{if(!pc[r.cultura_nome])pc[r.cultura_nome]={feitos:0};if(r.feito)pc[r.cultura_nome].feitos++;});const lista=[];Object.keys(pc).forEach(n=>{if(pc[n].feitos>0){const found=TODAS_CULTURAS.find(x=>x.c.nome===n);if(found)lista.push({cultura:found.c,regiao:found.rg,pct:Math.round(pc[n].feitos/10*100)});}});setPlanos(lista);});sb.from('simulacoes').select('id').eq('usuario_id',id).then(({data})=>setHistorico(data||[]));}
function abrirSimulacao(s){const found=TODAS_CULTURAS.find(x=>x.c.nome===s.cultura_nome);if(!found)return;setPrecarregar(s);setSel({r:found.rg,c:found.c});setScreen(0);}
function abrirPlano(p){setPrecarregar(null);setSel({r:p.regiao,c:p.cultura});setScreen(2);}

function addMonths(month, day, n) {
  const d = new Date(2025, month, day);
  d.setMonth(d.getMonth() + n);
  return { month: d.getMonth(), day: d.getDate() };
}

function Loader({ msg }) {
  return (
    <div style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:14, padding:"44px 0" }}>

function Field({ label, value, onChange, prefix, suffix, hint, accent="#5B8AF5" }) {
  const [focus, setFocus] = useState(false);
  const ref = useRef();
  return (
    <div onClick={() => ref.current?.focus()} style={{ background:"#fff", borderRadius:14, padding:"13px 16px", border:`1.5px solid ${focus ? accent : "#EEEDF2"}`, boxShadow:focus?`0 0 0 3px ${accent}18`:"0 1px 3px #0000000a", transition:"all .18s", cursor:"text" }}>
      <div style={{ fontSize:10, fontWeight:700, letterSpacing:".1em", textTransform:"uppercase", color:"#AAA6BE", marginBottom:5 }}>{label}</div>
      <div style={{ display:"flex", alignItems:"baseline", gap:4 }}>
        {prefix && <span style={{ fontSize:14, color:accent, fontWeight:700 }}>{prefix}</span>}
        <input ref={ref} type="number" value={value} onChange={e => onChange(parseFloat(e.target.value)||0)} onFocus={() => setFocus(true)} onBlur={() => setFocus(false)} style={{ border:"none", outline:"none", background:"transparent", fontSize:20, fontWeight:700, color:"#1A1A2E", fontFamily:"'DM Sans',sans-serif", width:"100%", minWidth:0 }} />
        {suffix && <span style={{ fontSize:12, color:"#C0BAD4", fontWeight:600, whiteSpace:"nowrap" }}>{suffix}</span>}
      </div>
      {hint && <div style={{ fontSize:10, color:"#C8C2DC", marginTop:3 }}>{hint}</div>}
    </div>
  );
}

function RulerSlider({ value, onChange, cor="#5B8AF5" }) {
  const min=500, max=50000, step=500;
  const pct = ((value-min)/(max-min))*100;
  const marks = [];
  for (let v=min; v<=max; v+=5000) marks.push(v);
  return (
    <div style={{ position:"relative", userSelect:"none" }}>
      <div style={{ position:"relative", height:48, marginBottom:4 }}>
        <div style={{ position:"absolute", left:0, right:0, top:20, height:8, borderRadius:99, background:"#EEEDF2", overflow:"hidden" }}>
          <div style={{ width:`${pct}%`, height:"100%", borderRadius:99, background:`linear-gradient(90deg,${cor},${cor}99)`, transition:"width .1s" }} />
        </div>
        {marks.map(m => {
          const mp = ((m-min)/(max-min))*100;
          const isLarge = m%10000===0;
          return <div key={m} style={{ position:"absolute", left:`${mp}%`, top:isLarge?30:33, transform:"translateX(-50%)", width:isLarge?2:1, height:isLarge?10:6, background:m<=value?cor:"#D4D0E2", borderRadius:1 }} />;
        })}
        <div style={{ position:"absolute", left:`${pct}%`, top:8, transform:"translateX(-50%)", width:32, height:32, borderRadius:"50%", background:`linear-gradient(135deg,${cor},${cor}99)`, border:"3px solid #fff", boxShadow:`0 2px 12px ${cor}66`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:12, color:"#fff", fontWeight:800, pointerEvents:"none", zIndex:2 }}>▕▏</div>
        <input type="range" min={min} max={max} step={step} value={value} onChange={e => onChange(parseInt(e.target.value))} style={{ WebkitAppearance:"none", appearance:"none", background:"transparent", cursor:"pointer", width:"100%", height:44, position:"absolute", inset:0, opacity:0, zIndex:10, margin:0 }} />
      </div>
      <div style={{ position:"relative", height:18 }}>
        {[500,10000,20000,30000,40000,50000].map(m => {
          const mp = ((m-min)/(max-min))*100;
          return <div key={m} style={{ position:"absolute", left:`${mp}%`, transform:"translateX(-50%)", fontSize:9, fontWeight:700, color:m<=value?cor:"#C0BAD4", whiteSpace:"nowrap" }}>{m>=10000?`${m/10000}ha`:`${m}m²`}</div>;
        })}
      </div>
    </div>
  );
}

        <div style={{ fontSize:10, color:"#9893B0" }}>{regiao.emoji} Região {regiao.label} · {cultura.dificuldade}</div>
      </div>
      <button onClick={onClear} style={{ background:"#F0EEF8", border:"none", borderRadius:8, padding:"6px 10px", fontSize:11, fontWeight:700, color:"#9893B0", cursor:"pointer", fontFamily:"'DM Sans',sans-serif", flexShrink:0 }}>Trocar ↩</button>
    </div>
  );
}

                <div style={{ fontSize:22 }}>{r.emoji}</div>

          <div style={{ fontSize:14, fontWeight:700, color:"#1A1A2E", marginBottom:6 }}>Escolha uma região acima</div>

      {/* Passo 2 — culturas */}
      {regiao && (
        <div style={{ padding:"0 24px", animation:"fadeUp .25s ease both" }} key={regiaoId}>
          <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:14 }}>
            <div style={{ width:22, height:22, borderRadius:99, background:regiao.cor, display:"flex", alignItems:"center", justifyContent:"center", fontSize:11, fontWeight:800, color:"#fff", flexShrink:0 }}>2</div>
            <div style={{ fontSize:13, fontWeight:700, color:"#1A1A2E" }}>Escolha a cultura — {regiao.emoji} Região {regiao.label}</div>
          </div>

          {/* Clima resumido */}
          <div style={{ background:"#fff", borderRadius:14, padding:"12px 16px", border:"1.5px solid #EEEDF2", marginBottom:14, display:"flex", gap:0 }}>

                <div style={{ fontSize:12, fontWeight:700, color:"#1A1A2E" }}>{b.v}</div>

                    <span style={{ fontSize:10, fontWeight:700, padding:"2px 8px", borderRadius:99, background:c.dificuldade==="Fácil"?"#D1FAE5":c.dificuldade==="Médio"?"#FEF9C3":"#FEE2E2", color:c.dificuldade==="Fácil"?"#065F46":c.dificuldade==="Médio"?"#92400E":"#991B1B" }}>{c.dificuldade}</span>
                    {i===0 && <span style={{ fontSize:10, fontWeight:700, padding:"2px 7px", borderRadius:99, background:"#FEF08A", color:"#713F12" }}>🥇 #1</span>}
                  </div>
                  <div style={{ fontSize:12, color:"#9893B0", lineHeight:1.4, marginBottom:6 }}>{c.porque}</div>
                  <div style={{ display:"flex", gap:8, flexWrap:"wrap", alignItems:"center" }}>

                    <span style={{ fontSize:10, color:"#D4D0E2" }}>|</span>

            ))}

/* ─── Screen: Calculadora ─── */
function CalcScreen({ cultura, regiao }) {
  const [cultivarId, setCultivarId]   = useState(cultura.cultivares[0].id);
  const cv = cultura.cultivares.find(c => c.id === cultivarId) || cultura.cultivares[0];
  const [areaSqm, setAreaSqm]         = useState(5000);
  const [prodHa, setProdHa]           = useState(cv.prod);
  const [custImpl, setCustImpl]       = useState(cultura.custImpl);
  const [custManejo, setCustManejo]   = useState(cultura.custManejo);
  const [precoA, setPrecoA]           = useState(cultura.precoA);
  const [precoV, setPrecoV]           = useState(cultura.precoV);
  const [pctA, setPctA]               = useState(60);
  const [cicloMes, setCicloMes]       = useState(cv.ciclo || cultura.ciclo);
  const [safrasAno, setSafrasAno]     = useState(cultura.safras);
  const [tab, setTab]                 = useState(0);

  useEffect(() => { setProdHa(cv.prod); setCicloMes(cv.ciclo || cultura.ciclo); }, [cultivarId]);

  const area        = areaSqm/10000;
  const implTotal   = custImpl*area;
  const manejoSafra = custManejo*area;
  const custoAnual  = implTotal+manejoSafra*safrasAno;
  const custoTotal  = custoAnual/safrasAno;
  const prodTotal   = area*prodHa;
  const custoPorKg  = custoTotal/prodTotal;
  const kgA         = prodTotal*pctA/100;
  const kgV         = prodTotal-kgA;
  const recTotal    = kgA*precoA+kgV*precoV;
  const lucro       = recTotal-custoTotal;
  const lucroAnual  = recTotal*safrasAno-custoAnual;
  const margem      = recTotal>0?(lucro/recTotal)*100:0;
  const roi         = custoAnual>0?(lucroAnual/custoAnual)*100:0;
  const sqm         = areaSqm.toLocaleString("pt-BR");
  const mesesPreparo = 1;

  const tabs = ["📐 Área","💸 Custos","💰 Preços","📊 Resultado"];

  return (
    <div style={{ paddingBottom:120, background:"#F8F7FC", minHeight:"100vh" }}>
      <div style={{ padding:"22px 22px 0" }}>
        <div style={{ fontSize:11, fontWeight:700, letterSpacing:".1em", color:"#BEB8D4", textTransform:"uppercase" }}>Calculadora</div>
        <div style={{ fontSize:24, fontWeight:800, color:"#1A1A2E", marginTop:2 }}>{cultura.emoji} {cultura.nome}</div>
        <div style={{ fontSize:13, color:"#9893B0", marginTop:3 }}>Simule custos, ciclos e lucro da sua plantação</div>
      </div>

      <div style={{ display:"flex", gap:8, padding:"14px 22px 0", overflowX:"auto" }}>
        {tabs.map((t,i) => (
          <button key={i} onClick={() => setTab(i)} style={{ padding:"8px 14px", borderRadius:99, border:"none", cursor:"pointer", fontFamily:"'DM Sans',sans-serif", fontSize:12, fontWeight:700, whiteSpace:"nowrap", background:tab===i?"#1A1A2E":"#EEEDF7", color:tab===i?"#fff":"#9893B0", transition:"all .15s", flexShrink:0 }}>{t}</button>
        ))}
      </div>

      <div style={{ padding:"14px 22px 0" }}>

        {/* TAB 0 */}
        {tab===0 && (
          <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
            {/* Cultivares/Variedades */}
            <div>
              <div style={{ fontSize:11, fontWeight:700, letterSpacing:".08em", textTransform:"uppercase", color:"#BEB8D4", marginBottom:10 }}>Escolha a variedade</div>
              <div style={{ display:"flex", gap:8, overflowX:"auto", paddingBottom:4 }}>
                {cultura.cultivares.map(c => (
                  <button key={c.id} onClick={() => setCultivarId(c.id)} style={{ padding:"10px 14px", borderRadius:12, minWidth:88, textAlign:"left", border:`2px solid ${cultivarId===c.id?c.cor:"#EEEDF2"}`, background:cultivarId===c.id?c.cor:"#fff", cursor:"pointer", transition:"all .15s", boxShadow:cultivarId===c.id?`0 4px 14px ${c.cor}44`:"none", flexShrink:0 }}>
                    <div style={{ fontSize:10, fontWeight:700, color:cultivarId===c.id?"rgba(255,255,255,.7)":"#C0BAD4" }}>{c.tag}</div>
                    <div style={{ fontSize:12, fontWeight:800, color:cultivarId===c.id?"#fff":"#1A1A2E", marginTop:2 }}>{c.name}</div>
                    <div style={{ fontSize:10, color:cultivarId===c.id?"rgba(255,255,255,.75)":"#BEB8D4", marginTop:2 }}>{fmtN(c.prod)} {cultura.ciclo<=6?"kg":"un"}/ha</div>
                  </button>
                ))}
              </div>
            </div>

            {/* Área */}
            <div style={{ background:"#fff", borderRadius:16, padding:"18px 18px 14px", border:"1.5px solid #EEEDF2" }}>
              <div style={{ display:"flex", justifyContent:"space-between", marginBottom:6 }}>
                <div>
                  <div style={{ fontSize:11, fontWeight:700, letterSpacing:".08em", textTransform:"uppercase", color:"#BEB8D4" }}>Tamanho da Área</div>
                  <div style={{ marginTop:6, display:"flex", alignItems:"baseline", gap:8 }}>
                    <span style={{ fontSize:34, fontWeight:800, color:"#1A1A2E", lineHeight:1 }}>{sqm}</span>
                    <span style={{ fontSize:16, color:"#9893B0", fontWeight:600 }}>m²</span>
                  </div>
                  <div style={{ fontSize:13, fontWeight:700, color:cultura.cor, marginTop:2 }}>{area<1?`${(area*100).toFixed(0)}% de 1 ha`:`${area.toFixed(area%1===0?0:2)} hectare${area!==1?"s":""}`}</div>
                </div>
                <div style={{ textAlign:"right", paddingTop:4 }}>
                  <div style={{ fontSize:11, color:"#C0BAD4" }}>≈ {(areaSqm/7140).toFixed(1)} campos</div>
                  <div style={{ fontSize:11, color:"#C0BAD4", marginTop:2 }}>{fmtN(areaSqm*5.5)} pés</div>
                </div>
              </div>
              <RulerSlider value={areaSqm} onChange={setAreaSqm} cor={cultura.cor} />
              <div style={{ marginTop:10, fontSize:10, color:"#C8C2DC", textAlign:"center" }}>◀ arraste de 500 em 500 m² ▶</div>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginTop:14 }}>
                {[
                  { icon:"📐", l:"Em metros", v:`${Math.round(Math.sqrt(areaSqm))}×${Math.round(Math.sqrt(areaSqm))} m` },
                  { icon:"⚽", l:"Campos", v:`${(areaSqm/7140).toFixed(2)}` },
                  { icon:"📦", l:"Produção/safra", v:fmtN(prodTotal)+" "+( prodTotal > 1000 ? "kg" : "un") },
                  { icon:"🌱", l:"Mudas/pés", v:fmtN(areaSqm*5.5) },
                ].map(b => (
                  <div key={b.l} style={{ background:"#F8F7FC", borderRadius:10, padding:"10px 12px" }}>
                    <div style={{ fontSize:14 }}>{b.icon}</div>
                    <div style={{ fontSize:10, color:"#BEB8D4", marginTop:2 }}>{b.l}</div>
                    <div style={{ fontSize:12, fontWeight:700, color:"#1A1A2E" }}>{b.v}</div>
                  </div>
                ))}
              </div>
            </div>

            {/* Ciclo */}
            <div style={{ background:"#fff", borderRadius:16, padding:"16px 18px", border:"1.5px solid #EEEDF2" }}>
              <div style={{ fontSize:11, fontWeight:700, letterSpacing:".08em", textTransform:"uppercase", color:"#BEB8D4", marginBottom:12 }}>⏱️ Ciclo & Safras</div>
              <div style={{ display:"flex", gap:10, marginBottom:14 }}>
                <div style={{ flex:1 }}><Field label="Ciclo (meses)" value={cicloMes} onChange={setCicloMes} suffix="meses" hint={`${cv.name}: padrão ${cv.ciclo||cultura.ciclo} meses`} accent={cultura.cor} /></div>
                <div style={{ flex:1 }}><Field label="Safras/ano" value={safrasAno} onChange={setSafrasAno} suffix="safras" hint="Ciclos produtivos por ano" accent="#F97316" /></div>
              </div>
              <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
                {[
                  { label:"Preparo",     detalhe:"1 mês",                              pct: Math.round(1/(mesesPreparo+cicloMes)*100),           bg:"#E8EAFF", border:"#A5B4FC", color:"#4338CA", icon:"🌍" },
                  { label:"Crescimento", detalhe:`${Math.round(cicloMes*.6)} meses`,   pct: Math.round(cicloMes*.6/(mesesPreparo+cicloMes)*100), bg:"#D1FAE5", border:"#6EE7B7", color:"#065F46", icon:"🌿" },
                  { label:"Colheita",    detalhe:`${Math.round(cicloMes*.4)} meses`,   pct: Math.round(cicloMes*.4/(mesesPreparo+cicloMes)*100), bg:"#FEE2E2", border:"#FCA5A5", color:"#991B1B", icon:cultura.emoji },
                ].map((s,i) => (
                  <div key={i} style={{ display:"flex", alignItems:"center", gap:8 }}>
                    <div style={{ width:96, flexShrink:0, display:"flex", alignItems:"center", gap:6 }}>
                      <div style={{ width:26, height:26, borderRadius:7, background:s.bg, border:`1.5px solid ${s.border}`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:13, flexShrink:0 }}>{s.icon}</div>
                      <div>
                        <div style={{ fontSize:11, fontWeight:700, color:"#1A1A2E", lineHeight:1.1 }}>{s.label}</div>
                        <div style={{ fontSize:10, color:"#9893B0" }}>{s.detalhe}</div>
                      </div>
                    </div>
                    <div style={{ flex:1, height:12, background:"#F0EEF8", borderRadius:99, overflow:"hidden" }}>
                      <div style={{ width:`${s.pct}%`, height:"100%", background:s.bg, borderRadius:99, border:`1px solid ${s.border}`, transition:"width .3s" }} />
                    </div>
                    <div style={{ width:30, textAlign:"right", fontSize:10, fontWeight:700, color:s.color, flexShrink:0 }}>{s.pct}%</div>
                  </div>
                ))}
              </div>
            </div>

            <Field label={`Produção esperada por ha/safra`} value={prodHa} onChange={setProdHa} suffix="kg/ha" hint={`${cv.name}: média ${fmtN(cv.prod)} kg/ha`} />
            <button onClick={() => setTab(1)} style={{ background:"#1A1A2E", color:"#fff", border:"none", borderRadius:14, padding:15, fontSize:14, fontWeight:700, cursor:"pointer", fontFamily:"'DM Sans',sans-serif" }}>Próximo: Custos →</button>
          </div>
        )}

        {/* TAB 1 */}
        {tab===1 && (
          <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
            <div style={{ background:"#EEF2FF", borderRadius:12, padding:"12px 16px", border:"1.5px solid #C7D2FE", display:"flex", gap:10 }}>
              <span style={{ fontSize:18 }}>📌</span>
              <div style={{ fontSize:12, color:"#4338CA", lineHeight:1.7 }}><strong>Implantação</strong> = investimento inicial (infraestrutura, mudas, preparo).<br/><strong>Manejo</strong> = custo por safra (mão de obra, insumos, colheita).</div>
            </div>
            <Field label="Custo de Implantação (R$/ha)" value={custImpl} onChange={setCustImpl} prefix="R$" hint="Pago uma vez no primeiro ciclo" accent="#E84855" />
            <Field label="Custo de Manejo (R$/ha/safra)" value={custManejo} onChange={setCustManejo} prefix="R$" hint="Custo operacional por ciclo" accent="#E84855" />
            <div style={{ background:"#fff", borderRadius:16, padding:"16px 18px", border:"1.5px solid #EEEDF2" }}>
              <div style={{ fontSize:11, fontWeight:700, letterSpacing:".08em", textTransform:"uppercase", color:"#BEB8D4", marginBottom:12 }}>Resumo de custos</div>
              {[
                { l:`Implantação total (${sqm} m²)`, v:fmt(implTotal) },
                { l:`Manejo por safra (${sqm} m²)`, v:fmt(manejoSafra) },
                { l:`Custo total 1º ano (${safrasAno} safras)`, v:fmt(custoAnual) },
                { l:"Custo médio por safra", v:fmt(custoTotal) },
                { l:"Custo por kg produzido", v:fmt(custoPorKg) },
              ].map((r,i) => (
                <div key={i} style={{ display:"flex", justifyContent:"space-between", padding:"10px 0", borderBottom:i<4?"1px solid #F5F3FA":"none" }}>
                  <span style={{ fontSize:12, color:"#6B6280" }}>{r.l}</span>
                  <span style={{ fontSize:13, fontWeight:700, color:"#E84855" }}>{r.v}</span>
                </div>
              ))}
            </div>
            <button onClick={() => setTab(2)} style={{ background:"#1A1A2E", color:"#fff", border:"none", borderRadius:14, padding:15, fontSize:14, fontWeight:700, cursor:"pointer", fontFamily:"'DM Sans',sans-serif" }}>Próximo: Preços →</button>
          </div>
        )}

        {/* TAB 2 */}
        {tab===2 && (
          <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
            <Field label="Preço no Atacado" value={precoA} onChange={setPrecoA} prefix="R$" suffix="/kg" accent="#5B8AF5" />
            <Field label="Preço no Varejo" value={precoV} onChange={setPrecoV} prefix="R$" suffix="/kg" accent="#00B87A" />
            <div style={{ background:"#fff", borderRadius:16, padding:"16px 18px", border:"1.5px solid #EEEDF2" }}>
              <div style={{ fontSize:11, fontWeight:700, letterSpacing:".08em", textTransform:"uppercase", color:"#BEB8D4", marginBottom:12 }}>Mix de vendas</div>
              <div style={{ height:40, borderRadius:10, overflow:"hidden", display:"flex", marginBottom:12 }}>
                <div style={{ width:`${pctA}%`, background:"linear-gradient(90deg,#5B8AF5,#7BA7FF)", display:"flex", alignItems:"center", justifyContent:"center", transition:"width .25s" }}>{pctA>15&&<span style={{ fontSize:11, fontWeight:700, color:"#fff" }}>{pctA}% Atacado</span>}</div>
                <div style={{ flex:1, background:"linear-gradient(90deg,#00C991,#00B87A)", display:"flex", alignItems:"center", justifyContent:"center" }}>{(100-pctA)>15&&<span style={{ fontSize:11, fontWeight:700, color:"#fff" }}>{100-pctA}% Varejo</span>}</div>
              </div>
              <input type="range" min={0} max={100} value={pctA} onChange={e => setPctA(+e.target.value)} style={{ WebkitAppearance:"none", appearance:"none", height:6, borderRadius:99, outline:"none", cursor:"pointer", width:"100%", display:"block", background:`linear-gradient(to right,#5B8AF5 ${pctA}%,#00C991 ${pctA}%)` }} />
            </div>
            <button onClick={() => setTab(3)} style={{ background:"#1A1A2E", color:"#fff", border:"none", borderRadius:14, padding:15, fontSize:14, fontWeight:700, cursor:"pointer", fontFamily:"'DM Sans',sans-serif" }}>Ver Resultado →</button>
          </div>
        )}

        {/* TAB 3 */}
        {tab===3 && (
          <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
            <div style={{ background:lucro>=0?`linear-gradient(135deg,${cultura.cor},${cultura.cor}bb)`:"linear-gradient(135deg,#FF6B8A,#E84855)", borderRadius:20, padding:"22px", boxShadow:`0 10px 32px ${cultura.cor}44` }}>
              <div style={{ fontSize:11, fontWeight:700, letterSpacing:".1em", color:"rgba(255,255,255,.65)" }}>LUCRO POR SAFRA</div>
              <div style={{ fontSize:36, fontWeight:800, color:"#fff", lineHeight:1.1, marginTop:4 }}>{fmt(lucro)}</div>
              <div style={{ fontSize:12, color:"rgba(255,255,255,.65)", marginTop:6 }}>ciclo {cicloMes}m · {cv.name} · {sqm} m²</div>

              ))}

            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>

                </div>
              ))}

          </div>

      </div>
    </div>

/* ─── HarvestCalendar ─── */
function HarvestCalendar({ cicloMes, safrasAno, cultura }) {
  const [plantDay, setPlantDay]     = useState(15);
  const [plantMonth, setPlantMonth] = useState(2);
  const safras = [];
  let cm = plantMonth, cd = plantDay;
  for (let s=0; s<Math.min(safrasAno,3); s++) {
    const plantio   = { month:cm, day:cd };
    const colheitaI = addMonths(cm, cd, Math.round(cicloMes*0.6));
    const colheitaF = addMonths(cm, cd, cicloMes);
    const prox      = addMonths(cm, cd, cicloMes+1);
    safras.push({ n:s+1, plantio, colheitaI, colheitaF });
    cm = prox.month; cd = prox.day;
  }
  const fmtDate = d => `${String(d.day).padStart(2,"0")} de ${MONTH_FULL[d.month]}`;
  return (
    <div style={{ background:"#fff", borderRadius:16, padding:"16px 18px", border:"1.5px solid #EEEDF2" }}>
      <div style={{ fontSize:11, fontWeight:700, letterSpacing:".08em", textTransform:"uppercase", color:"#BEB8D4", marginBottom:14 }}>🗓️ Calendário de Colheita</div>
      <div style={{ background:"#F8F7FC", borderRadius:12, padding:"12px 14px", marginBottom:16 }}>
        <div style={{ fontSize:11, fontWeight:700, color:"#BEB8D4", textTransform:"uppercase", marginBottom:8 }}>Data do plantio</div>
        <div style={{ display:"flex", gap:10, alignItems:"center" }}>
          <div style={{ flex:"0 0 60px" }}>
            <div style={{ fontSize:10, color:"#C0BAD4", marginBottom:4 }}>Dia</div>
            <input type="number" min={1} max={31} value={plantDay} onChange={e => setPlantDay(Math.min(31,Math.max(1,parseInt(e.target.value)||1)))} style={{ width:"100%", border:"1.5px solid #EEEDF2", borderRadius:10, padding:"8px 6px", fontSize:16, fontWeight:800, color:"#1A1A2E", textAlign:"center", outline:"none", background:"#fff", fontFamily:"'DM Sans',sans-serif" }} />
          </div>
          <div style={{ fontSize:18, color:"#C0BAD4", paddingTop:18 }}>/</div>
          <div style={{ flex:1 }}>
            <div style={{ fontSize:10, color:"#C0BAD4", marginBottom:4 }}>Mês</div>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(6,1fr)", gap:3 }}>
              {MONTHS.map((m,i) => (
                <button key={i} onClick={() => setPlantMonth(i)} style={{ padding:"5px 2px", borderRadius:7, border:"1.5px solid", borderColor:plantMonth===i?cultura.cor:"#EEEDF2", background:plantMonth===i?cultura.cor:"#fff", color:plantMonth===i?"#fff":"#9893B0", fontSize:9, fontWeight:700, cursor:"pointer", fontFamily:"'DM Sans',sans-serif" }}>{m}</button>
              ))}
            </div>
          </div>
        </div>
        <div style={{ marginTop:10, fontSize:12, fontWeight:600, color:cultura.cor, textAlign:"center" }}>🌱 {String(plantDay).padStart(2,"0")} de {MONTH_FULL[plantMonth]}</div>
      </div>
      <div style={{ display:"flex", gap:2, marginBottom:8 }}>
        {Array.from({length:12},(_,i) => {
          const m = (plantMonth+i)%12;
          let phase="idle";
          for (const s of safras) {
            const off = (s.n-1)*(cicloMes+1);
            if (i===off) phase="plantio";
            else if (i>off&&i<off+Math.round(cicloMes*.6)) phase="crescimento";
            else if (i>=off+Math.round(cicloMes*.6)&&i<=off+cicloMes) phase="colheita";
          }
          const bg = phase==="plantio"?"#5B8AF5":phase==="crescimento"?"#D1FAE5":phase==="colheita"?cultura.cor:"#F0EEF8";
          const tc = phase==="plantio"||phase==="colheita"?"#fff":phase==="crescimento"?"#065F46":"#C8C2DC";
          return (
            <div key={i} style={{ flex:1, background:bg, borderRadius:6, padding:"6px 2px", textAlign:"center" }}>
              <div style={{ fontSize:8, fontWeight:700, color:tc }}>{MONTHS[m]}</div>
              <div style={{ fontSize:7, color:tc, marginTop:1 }}>{phase==="plantio"?"🌱":phase==="crescimento"?"🌿":phase==="colheita"?cultura.emoji:""}</div>
            </div>
          );
        })}
      </div>
      {safras.map((s,i) => (
        <div key={i} style={{ borderRadius:12, padding:"12px 14px", marginBottom:i<safras.length-1?8:0, background:i===0?"#FFF1F2":i===1?"#F0F4FF":"#F0FDF4", border:`1.5px solid ${i===0?"#FECDD3":i===1?"#C7D2FE":"#BBF7D0"}` }}>
          <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:8 }}>
            <div style={{ width:28, height:28, borderRadius:8, background:i===0?"#E84855":i===1?"#5B8AF5":"#00B87A", display:"flex", alignItems:"center", justifyContent:"center", fontSize:13, color:"#fff", fontWeight:800 }}>{s.n}ª</div>
            <div style={{ fontSize:13, fontWeight:700, color:"#1A1A2E" }}>{["Primeira","Segunda","Terceira"][i]} Safra</div>
          </div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:6 }}>
            {[{ icon:"🌱",l:"Plantio",v:fmtDate(s.plantio)},{icon:"🌿",l:"Início colheita",v:fmtDate(s.colheitaI)},{icon:cultura.emoji,l:"Fim colheita",v:fmtDate(s.colheitaF)}].map(r => (
              <div key={r.l} style={{ background:"rgba(255,255,255,.7)", borderRadius:8, padding:"8px", textAlign:"center" }}>
                <div style={{ fontSize:14 }}>{r.icon}</div>
                <div style={{ fontSize:9, color:"#BEB8D4", fontWeight:600, textTransform:"uppercase", marginTop:2 }}>{r.l}</div>
                <div style={{ fontSize:10, fontWeight:700, color:"#1A1A2E", marginTop:2, lineHeight:1.3 }}>{r.v}</div>
              </div>
            ))}
          </div>
        </div>
      ))}
    </div>
  );
}

/* ─── Screen: IA Cultura ─── */
function IACulturaScreen({ cultura, regiao }) {
  const dados = DICAS_CULTURA[cultura.nome];

  return (
    <div style={{ paddingBottom:120, background:"#F8F7FC", minHeight:"100vh" }}>
      <div style={{ padding:"22px 22px 16px" }}>
        <div style={{ fontSize:11, fontWeight:700, letterSpacing:".1em", color:"#BEB8D4", textTransform:"uppercase" }}>Guia do Produtor</div>
        <div style={{ fontSize:24, fontWeight:800, color:"#1A1A2E", marginTop:2 }}>{cultura.emoji} {cultura.nome}</div>
        <div style={{ fontSize:13, color:"#9893B0", marginTop:3 }}>Do plantio à comercialização — dicas essenciais para começar</div>
      </div>
      <div style={{ padding:"0 22px", display:"flex", flexDirection:"column", gap:14 }}>

        {/* Intro */}
        <div style={{ background:`${cultura.cor}0f`, borderRadius:14, padding:"14px 16px", border:`1.5px solid ${cultura.cor}22` }}>
          <div style={{ fontSize:22, marginBottom:6 }}>{cultura.emoji}</div>
          <div style={{ fontSize:15, fontWeight:800, color:"#1A1A2E", marginBottom:4 }}>6 Dicas Essenciais — {cultura.nome}</div>
          <div style={{ fontSize:13, color:"#6B6280", lineHeight:1.6 }}>{dados?.intro}</div>
        </div>

        {/* Dicas */}
        {dados?.dicas.map((d, i) => (
          <div key={i} style={{ background:`${d.cor}09`, borderRadius:14, padding:"14px 16px", border:`1.5px solid ${d.cor}22` }}>
            <div style={{ display:"flex", gap:10, alignItems:"center", marginBottom:8 }}>
              <div style={{ width:36, height:36, borderRadius:10, flexShrink:0, background:`linear-gradient(135deg,${d.cor},${d.cor}bb)`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:18 }}>{d.icon}</div>
              <span style={{ fontSize:13, fontWeight:700, color:"#1A1A2E" }}>{d.titulo}</span>
            </div>
            <p style={{ fontSize:12, color:"#6B6280", lineHeight:1.75, margin:0 }}>{d.texto}</p>
          </div>
        ))}

        {/* Região */}
        <div style={{ background:"#F0F4FF", borderRadius:14, padding:"12px 16px", border:"1.5px solid #C7D2FE", display:"flex", gap:10 }}>

          </div>
        </div>
      </div>
    </div>
  );
}

                  {i===0&&<span style={{ fontSize:9, fontWeight:700, padding:"2px 7px", borderRadius:99, background:"#FEF08A", color:"#713F12" }}>🥇 #1</span>}
                </div>
                <div style={{ fontSize:12, color:"#9893B0", marginBottom:6, lineHeight:1.4 }}>{c.porque}</div>
                <div style={{ display:"flex", gap:10, flexWrap:"wrap" }}>
                  <span style={{ fontSize:13, fontWeight:700, color:c.cor }}>≈ {fmt(c.lucro_ha)}/ha/ano</span>
                  <span style={{ fontSize:11, color:"#BEB8D4" }}>· {c.ciclo}m ciclo · {c.safras} safra{c.safras>1?"s":""}/ano</span>
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ─── Screen: Plano ─── */
function PlanoScreen({ cultura, regiao, cicloMes, safrasAno }) {
  const dadosPlano = PLANO_CULTURA[cultura.nome];
  const [expandido, setExpandido] = useState(null);
  const [flat, setFlat] = useState(() => {
    if (!dadosPlano) return [];
    const f = [];
    dadosPlano.fases.forEach(fase => {
      fase.etapas.flat().forEach((e, i) => {
        f.push({ ...e, id:`${fase.nome}-${i}`, fase:fase.nome, faseCor:fase.cor, faseIcon:fase.icon, feito:false, dataFeito:null });
      });
    });
    return f;
  });

  if (!dadosPlano) return (
    <div style={{ padding:"40px 22px", textAlign:"center" }}>
      <div style={{ fontSize:13, color:"#9893B0" }}>Plano não disponível para esta cultura ainda.</div>
    </div>
  );

  const fases = dadosPlano.fases;
  const etapas = { fases, flat };

  const marcar = (id) => {
    const hoje = new Date().toLocaleDateString("pt-BR");
    setFlat(prev => prev.map(e => e.id===id ? {...e, feito:!e.feito, dataFeito:e.feito?null:hoje} : e));
  };

  const feitosCount = flat.filter(e=>e.feito).length;
  const totalCount  = flat.length;
  const pct         = totalCount>0 ? Math.round(feitosCount/totalCount*100) : 0;
  const primeiroIncompleto = flat.find(e=>!e.feito);

  return (
    <div style={{ paddingBottom:120, background:"#F8F7FC", minHeight:"100vh" }}>
      <div style={{ padding:"22px 22px 0" }}>
        <div style={{ fontSize:11, fontWeight:700, letterSpacing:".1em", color:"#BEB8D4", textTransform:"uppercase" }}>Do zero à primeira colheita</div>
        <div style={{ fontSize:24, fontWeight:800, color:"#1A1A2E", marginTop:2 }}>📋 Plano de Produção</div>
        <div style={{ fontSize:13, color:"#9893B0", marginTop:3 }}>Siga o passo a passo e marque cada etapa concluída</div>
      </div>
      <div style={{ padding:"14px 22px 0", display:"flex", flexDirection:"column", gap:14 }}>
        <>
            {/* Progresso */}
            <div style={{ background:"#fff", borderRadius:16, padding:"16px 18px", border:"1.5px solid #EEEDF2" }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
                <div>
                  <div style={{ fontSize:11, fontWeight:700, color:"#BEB8D4", textTransform:"uppercase" }}>Progresso</div>
                  <div style={{ fontSize:22, fontWeight:800, color:"#1A1A2E", marginTop:2 }}>{pct}% concluído</div>
                </div>
                <div style={{ textAlign:"right" }}>
                  <div style={{ fontSize:26, fontWeight:800, color:"#00B87A" }}>{feitosCount}</div>
                  <div style={{ fontSize:11, color:"#BEB8D4" }}>de {totalCount} etapas</div>
                </div>
              </div>
              <div style={{ height:10, background:"#F0EEF8", borderRadius:99, overflow:"hidden" }}>
                <div style={{ width:`${pct}%`, height:"100%", borderRadius:99, background:pct===100?"#00B87A":`linear-gradient(90deg,${cultura.cor},#5B8AF5)`, transition:"width .5s ease" }} />
              </div>
              {/* fases mini */}
              <div style={{ display:"flex", gap:6, marginTop:12, flexWrap:"wrap" }}>
                {fases.map(f => {
                  const total = f.etapas?.length || 0;
                  const done  = flat.filter(e=>e.fase===f.nome&&e.feito).length;
                  const allDone = done===total;
                  return (
                    <div key={f.nome} style={{ display:"flex", alignItems:"center", gap:4, background:allDone?`${f.cor}18`:"#F8F7FC", border:`1px solid ${allDone?f.cor+"44":"#EEEDF2"}`, borderRadius:99, padding:"4px 10px" }}>
                      <span style={{ fontSize:10 }}>{f.icon}</span>
                      <span style={{ fontSize:9, fontWeight:700, color:allDone?f.cor:"#BEB8D4" }}>{f.nome.split(" ")[0]} {done}/{total}</span>
                    </div>
                  );
                })}
              </div>
            </div>

            {/* Info */}
            <div style={{ background:`${cultura.cor}0e`, borderRadius:12, padding:"10px 14px", border:`1.5px solid ${cultura.cor}22`, display:"flex", gap:10, alignItems:"center" }}>
              <span style={{ fontSize:20 }}>{cultura.emoji}</span>
              <div style={{ fontSize:12, color:"#4B4868", lineHeight:1.5 }}>Plano para <strong>{cultura.nome}</strong> · ciclo <strong>{cicloMes}m</strong> · <strong>{safrasAno} safra{safrasAno>1?"s":""}/ano</strong> · Região <strong>{regiao.label}</strong></div>
            </div>

            {/* Etapas por fase */}
            {fases.map(fase => {
              const etapasFase = flat.filter(e=>e.fase===fase.nome);
              const doneInFase = etapasFase.filter(e=>e.feito).length;
              const faseConcluida = doneInFase===etapasFase.length;
              return (
                <div key={fase.nome}>
                  <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:10 }}>
                    <div style={{ width:32, height:32, borderRadius:10, background:faseConcluida?`linear-gradient(135deg,${fase.cor},${fase.cor}bb)`:"#F0EEF8", display:"flex", alignItems:"center", justifyContent:"center", fontSize:15 }}>{faseConcluida?"✓":fase.icon}</div>
                    <div>
                      <div style={{ fontSize:13, fontWeight:800, color:faseConcluida?fase.cor:"#1A1A2E" }}>{fase.nome}</div>
                      <div style={{ fontSize:10, color:"#BEB8D4" }}>{doneInFase}/{etapasFase.length} etapas</div>
                    </div>
                    <div style={{ marginLeft:"auto", width:60, height:4, background:"#F0EEF8", borderRadius:99, overflow:"hidden" }}>
                      <div style={{ width:`${etapasFase.length>0?(doneInFase/etapasFase.length)*100:0}%`, height:"100%", background:fase.cor, borderRadius:99, transition:"width .4s" }} />
                    </div>
                  </div>
                  <div style={{ position:"relative", paddingLeft:20 }}>
                    <div style={{ position:"absolute", left:10, top:0, bottom:0, width:2, background:faseConcluida?fase.cor:"#EEEDF2", borderRadius:99 }} />
                    {etapasFase.map((etapa, ei) => {
                      const isActive   = etapa.id===primeiroIncompleto?.id;
                      const isExpanded = expandido===etapa.id;
                      return (
                        <div key={etapa.id} style={{ position:"relative", marginBottom:ei<etapasFase.length-1?10:16 }}>
                          <div style={{ position:"absolute", left:-20, top:14, width:14, height:14, borderRadius:"50%", zIndex:1, background:etapa.feito?fase.cor:isActive?"#fff":"#F0EEF8", border:`2px solid ${etapa.feito?fase.cor:isActive?fase.cor:"#D4D0E2"}`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:7, color:"#fff", boxShadow:isActive?`0 0 0 3px ${fase.cor}33`:"none" }}>{etapa.feito&&"✓"}</div>
                          <div style={{ background:etapa.feito?"#FAFFFE":isActive?"#fff":"#FAFAFA", borderRadius:14, overflow:"hidden", border:`1.5px solid ${etapa.feito?fase.cor+"44":isActive?fase.cor:"#EEEDF2"}`, boxShadow:isActive?`0 4px 16px ${fase.cor}22`:"none" }}>
                            <div onClick={() => setExpandido(isExpanded?null:etapa.id)} style={{ padding:"12px 14px", cursor:"pointer", display:"flex", gap:10, alignItems:"flex-start" }}>
                              <div style={{ width:36, height:36, borderRadius:10, flexShrink:0, background:etapa.feito?`linear-gradient(135deg,${fase.cor},${fase.cor}bb)`:`${fase.cor}15`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:18 }}>{etapa.feito?"✅":etapa.icon}</div>
                              <div style={{ flex:1, minWidth:0 }}>
                                <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                                  <span style={{ fontSize:13, fontWeight:700, color:etapa.feito?"#9893B0":"#1A1A2E", textDecoration:etapa.feito?"line-through":"none" }}>{etapa.titulo}</span>
                                  {isActive&&!etapa.feito&&<span style={{ fontSize:9, fontWeight:700, padding:"2px 6px", borderRadius:99, background:fase.cor, color:"#fff" }}>AGORA</span>}
                                </div>
                                {!etapa.feito&&<div style={{ fontSize:11, color:"#BEB8D4", marginTop:2 }}>{etapa.desc?.substring(0,60)}…</div>}
                                {etapa.feito&&etapa.dataFeito&&<div style={{ fontSize:11, color:fase.cor, marginTop:3, fontWeight:600 }}>✓ Concluído em {etapa.dataFeito}</div>}
                              </div>
                              <span style={{ fontSize:14, color:"#C0BAD4", flexShrink:0, marginTop:2 }}>{isExpanded?"▲":"▼"}</span>
                            </div>
                            {isExpanded && (
                              <div style={{ padding:"0 14px 14px", borderTop:"1px solid #F5F3FA" }}>
                                <p style={{ fontSize:13, color:"#4B4868", lineHeight:1.7, margin:"12px 0 10px" }}>{etapa.desc}</p>
                                <div style={{ background:"#F8F7FC", borderRadius:10, padding:"10px 12px", marginBottom:12 }}>
                                  <div style={{ fontSize:10, fontWeight:700, color:fase.cor, textTransform:"uppercase", marginBottom:6 }}>💡 Dicas práticas</div>
                                  {etapa.dicas?.map((d,di) => (
                                    <div key={di} style={{ display:"flex", gap:6, marginBottom:4, alignItems:"flex-start" }}>
                                      <span style={{ fontSize:10, color:fase.cor, marginTop:1, flexShrink:0 }}>→</span>
                                      <span style={{ fontSize:12, color:"#6B6280", lineHeight:1.5 }}>{d}</span>
                                    </div>
                                  ))}
                                </div>
                                <button onClick={() => marcar(etapa.id)} style={{ background:etapa.feito?"#FFF5F5":`linear-gradient(135deg,${fase.cor},${fase.cor}cc)`, color:etapa.feito?"#E84855":"#fff", border:etapa.feito?"1.5px solid #FECDD3":"none", borderRadius:12, padding:"12px", fontSize:13, fontWeight:700, cursor:"pointer", fontFamily:"'DM Sans',sans-serif", width:"100%", boxShadow:etapa.feito?"none":`0 4px 14px ${fase.cor}44` }}>
                                  {etapa.feito?"↩ Desfazer":"✓ Marcar como concluído"}
                                </button>
                              </div>
                            )}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })}

            {feitosCount===totalCount&&totalCount>0&&(
              <div style={{ background:"linear-gradient(135deg,#00C991,#00B87A)", borderRadius:20, padding:"22px", textAlign:"center", boxShadow:"0 10px 32px #00B87A44" }}>
                <div style={{ fontSize:40 }}>🏆</div>
                <div style={{ fontSize:20, fontWeight:800, color:"#fff", marginTop:8 }}>Parabéns!</div>
                <div style={{ fontSize:13, color:"rgba(255,255,255,.8)", marginTop:6, lineHeight:1.6 }}>Você completou todas as etapas do plano de {cultura.nome}. Primeira colheita concluída!</div>
              </div>
            )}

            <button onClick={() => setFlat(fases.flatMap((fase,fi) => fase.etapas.flat().map((e,i) => ({...e, id:`${fase.nome}-${i}`, fase:fase.nome, faseCor:fase.cor, faseIcon:fase.icon, feito:false, dataFeito:null}))))} style={{ background:"#F8F7FC", border:"1.5px solid #EEEDF2", borderRadius:14, padding:"12px", fontSize:12, fontWeight:700, color:"#BEB8D4", cursor:"pointer", fontFamily:"'DM Sans',sans-serif" }}>🔄 Reiniciar plano</button>
        </>
      </div>
    </div>
  );
}

/* ─── Main App ─── */
function App() {
  const [selection, setSelection] = useState(null); // { regiao, cultura }
  const [screen, setScreen]       = useState(0);
  const [cicloMes, setCicloMes]   = useState(8);
  const [safrasAno, setSafrasAno] = useState(2);

  const handleSelect = (regiao, cultura) => {
    setSelection({ regiao, cultura });
    setCicloMes(cultura.ciclo);
    setSafrasAno(cultura.safras);
    setScreen(0);
  };

  const handleClear = () => { setSelection(null); setScreen(0); };

  const NAV = [
    { icon:"🧮", label:"Calculadora", s:0 },
    { icon:"🤖", label:"IA Cultura",  s:1 },
    { icon:"🗺️", label:"IA Local",    s:2 },
    { icon:"📋", label:"Plano",       s:3 },
  ];
  const navColors = ["#E84855","#5B8AF5","#F97316","#00B87A"];

  return (
    <div style={{ minHeight:"100vh", background:"#F8F7FC", fontFamily:"'DM Sans',sans-serif", maxWidth:430, margin:"0 auto" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap');
        *{box-sizing:border-box;margin:0;padding:0}
        input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
        input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:#fff;border:3px solid #5B8AF5;box-shadow:0 2px 8px #0002;cursor:pointer}
        ::-webkit-scrollbar{width:0;height:0}
        @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
        @keyframes spin{to{transform:rotate(360deg)}}
        body{margin:0;background:#F8F7FC}
      `}</style>

      {/* Sem seleção → tela de seleção */}
      {!selection && <SelectScreen onSelect={handleSelect} />}

      {/* Com seleção → app completo */}
      {selection && (
        <>
          <CultureBadge cultura={selection.cultura} regiao={selection.regiao} onClear={handleClear} />

          {screen===0 && <CalcScreen cultura={selection.cultura} regiao={selection.regiao} />}
          {screen===1 && <IACulturaScreen key={selection.cultura.nome} cultura={selection.cultura} regiao={selection.regiao} />}
          {screen===2 && <IALocalScreen cultura={selection.cultura} regiao={selection.regiao} />}
          {screen===3 && <PlanoScreen key={selection.cultura.nome} cultura={selection.cultura} regiao={selection.regiao} cicloMes={cicloMes} safrasAno={safrasAno} />}

          {/* Bottom Nav */}
          <div style={{ position:"fixed", bottom:0, left:"50%", transform:"translateX(-50%)", width:"100%", maxWidth:430, background:"rgba(255,255,255,0.97)", backdropFilter:"blur(24px)", borderTop:"1px solid #EEEDF2", padding:"8px 0 20px", display:"flex", justifyContent:"space-around", zIndex:200 }}>
            {NAV.map(n => {
              const c = selection.cultura.cor || navColors[n.s];
              const active = screen===n.s;
              return (
                <button key={n.s} onClick={() => setScreen(n.s)} style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:3, background:"transparent", border:"none", cursor:"pointer", padding:"0 10px" }}>
                  <div style={{ width:42, height:42, borderRadius:13, background:active?c:"#F0EEF8", display:"flex", alignItems:"center", justifyContent:"center", fontSize:18, transition:"all .2s", boxShadow:active?`0 4px 14px ${c}44`:"none" }}>{n.icon}</div>
                  <span style={{ fontSize:9, fontWeight:700, letterSpacing:".04em", color:active?c:"#C8C2DC" }}>{n.label}</span>
                </button>
              );
            })}
          </div>
        </>
      )}
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
